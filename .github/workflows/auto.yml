name: Auto-Maintain
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Touch README
        run: |
          if [ -f README.md ]; then
            echo "<!-- auto: $(date -u +%Y-%m-%d) -->" >> README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: auto-maintain [skip ci]" --allow-empty
            git push
          fi